<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DCSketch — SCADA / DCS Architecture & Estimation Workbench</title>
<meta name="description" content="DCSketch (SCADAsketch) — a data-dense, modular SCADA/DCS architecture and estimation workbench for greenfield data-center and industrial control-system planning. Generative intake, a spatial node canvas, point-level I/O, electrical load/panel/cable schedules, and full line-item hardware, labor &amp; licensing estimation. The Revit of DCS/SCADA planning."/>
<meta name="theme-color" content="#f6f7f8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg0:#eef0f2; --bg1:#f6f7f8; --bg2:#e6e9ec;
  --panel:#f4f5f7; --panel2:#eaecef;
  --edge:#c7ccd2; --edge2:#dde0e4;
  --holo:#2f6fa8; --holo-dim:#6f8fac; --holo-deep:#1f4f7a;
  --blue:#2f6fa8; --amber:#a8681f; --amber-dim:#c9a877;
  --green:#1f7a4c; --red:#b23b3b; --violet:#5f56a0; --pink:#a1527c; --lime:#6f8a2a;
  --ink:#1c232b; --ink-dim:#57626d; --ink-mut:#8993a0;
  --grid:rgba(60,72,86,.09); --grid2:rgba(60,72,86,.045);
  --mono:'IBM Plex Mono',ui-monospace,'Cascadia Code',monospace;
  --disp:'Inter',system-ui,-apple-system,sans-serif;
  --body:'Inter',system-ui,-apple-system,sans-serif;
  --glow:none;
  --railW:48px; --treeW:224px; --panelW:296px; --topH:48px; --dockH:232px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg0);color:var(--ink);font-family:var(--body);
  overflow:hidden;-webkit-font-smoothing:antialiased;font-size:13px}
button{font-family:inherit;color:inherit;cursor:pointer;background:none;border:none}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#c2c8ce;border-radius:8px}
::-webkit-scrollbar-corner,::-webkit-scrollbar-track{background:transparent}
.mono{font-family:var(--mono)}

#app{display:grid;height:100vh;
  grid-template-columns:var(--railW) var(--treeW) 1fr var(--panelW);
  grid-template-rows:26px var(--topH) 1fr var(--dockH);
  grid-template-areas:"menu menu menu menu" "top top top top" "rail tree canvas panel" "rail dock dock dock";}
body.dock-min #app{grid-template-rows:26px var(--topH) 1fr 34px}
body.dock-max #app{grid-template-rows:26px var(--topH) 90px 1fr}
body.hidetree #app{grid-template-columns:var(--railW) 0 1fr var(--panelW)}
body.hidepanel #app{grid-template-columns:var(--railW) var(--treeW) 1fr 0}

/* ── menu bar ── */
#menubar{grid-area:menu;display:flex;align-items:stretch;background:var(--panel);border-bottom:1px solid var(--edge);
  font-family:var(--disp);font-size:12px;z-index:55;position:relative;user-select:none}
#menubar .mlogo{display:flex;align-items:center;gap:5px;padding:0 12px 0 10px;color:var(--ink-dim);font-weight:700;font-size:12px;border-right:1px solid var(--edge2)}
.menu{position:relative}
.menu>.mt{padding:0 11px;height:26px;display:flex;align-items:center;color:var(--ink-dim);cursor:pointer;letter-spacing:.01em}
.menu.open>.mt,.menu>.mt:hover{background:var(--panel2);color:var(--ink)}
.mdrop{position:absolute;top:100%;left:0;min-width:224px;background:#fff;border:1px solid var(--edge);border-radius:0 0 6px 6px;
  box-shadow:0 10px 26px rgba(30,40,50,.16);padding:5px;display:none;z-index:70}
.menu.open>.mdrop{display:block}
.mitem{display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:4px;color:var(--ink-dim);cursor:pointer;
  font-family:var(--body);font-size:13px;white-space:nowrap;position:relative}
.mitem:hover{background:#eaf1f8;color:var(--holo)}
.mitem .mic{width:15px;text-align:center;color:var(--holo-dim);flex-shrink:0}
.mitem:hover .mic{color:var(--holo)}
.mitem .k{margin-left:auto;padding-left:18px;font-family:var(--mono);font-size:9px;color:var(--ink-mut)}
.mitem .ar{margin-left:auto;color:var(--ink-mut);font-size:10px}
.msep{height:1px;background:var(--edge2);margin:4px 8px}
.mhd{font-family:var(--mono);font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-mut);padding:5px 10px 2px}
.msub{position:absolute;left:100%;top:-6px;min-width:230px;background:#fff;border:1px solid var(--edge);border-radius:6px;
  box-shadow:0 10px 26px rgba(30,40,50,.16);padding:5px;display:none}
.mitem.has-sub:hover>.msub{display:block}
.mitem.has-sub>.msub .mitem .desc{display:block;font-size:9.5px;color:var(--ink-mut);font-family:var(--mono);margin-top:1px}
.mitem.tpl{align-items:flex-start}.mitem.tpl .mic{margin-top:2px}
.mitem.tpl .tname{display:flex;flex-direction:column}
/* ── top bar ── */
#top{grid-area:top;display:flex;align-items:center;gap:12px;padding:0 10px;position:relative;z-index:40;
  background:var(--bg1);border-bottom:1px solid var(--edge)}
.brand{display:flex;align-items:center;gap:7px;font-family:var(--disp);font-weight:700;font-size:16px;white-space:nowrap}
.brand .cube{color:var(--holo)}
.brand b{color:var(--holo)}
.proj{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--ink-dim);text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:24ch}
.proj span{color:var(--ink)}
.kpis{display:flex;gap:0;margin-left:6px}
.kpi{padding:0 12px;text-align:center;border-left:1px solid var(--edge2)}
.kpi .v{font-family:var(--disp);font-weight:700;font-size:15px;line-height:1;color:var(--ink)}
.kpi .v.g{color:var(--green)}.kpi .v.a{color:var(--amber)}
.kpi .l{font-family:var(--mono);font-size:8px;letter-spacing:.08em;color:var(--ink-mut);text-transform:uppercase;margin-top:2px}
.spacer{flex:1}
.tbtn{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:6px 10px;
  border:1px solid var(--edge);border-radius:4px;color:var(--ink-dim);display:inline-flex;align-items:center;gap:5px;transition:.15s;white-space:nowrap;background:#fff}
.tbtn:hover:not(:disabled){border-color:var(--holo);color:var(--holo)}
.tbtn:disabled{opacity:.4;cursor:not-allowed}
.tbtn.pri{background:var(--holo);color:#fff;border-color:var(--holo);font-weight:600}
.tbtn.pri:hover{background:var(--holo-deep);color:#fff;border-color:var(--holo-deep)}

/* ── left rail ── */
#rail{grid-area:rail;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;
  background:var(--panel);border-right:1px solid var(--edge);z-index:30}
.rail-ic{width:34px;height:34px;display:grid;place-items:center;border-radius:6px;color:var(--ink-mut);transition:.15s;position:relative}
.rail-ic svg{width:18px;height:18px}
.rail-ic:hover{color:var(--holo);background:#e6edf4}
.rail-ic.on{color:var(--holo);background:#dce9f4}
.rail-sep{flex:1}
.rail-ic[data-tip]:hover::after{content:attr(data-tip);position:absolute;left:42px;white-space:nowrap;background:#26313c;
  border:1px solid #26313c;padding:4px 8px;border-radius:4px;font-family:var(--mono);font-size:10px;color:#fff;z-index:60;letter-spacing:.04em}

/* ── tree ── */
#tree{grid-area:tree;background:var(--panel);border-right:1px solid var(--edge);overflow-y:auto;overflow-x:hidden;z-index:20}
.tree-tabs{display:flex;gap:2px;padding:7px 6px 0;position:sticky;top:0;background:var(--panel);z-index:2}
.tree-tab{flex:1;font-family:var(--mono);font-size:8.5px;letter-spacing:.03em;text-transform:uppercase;padding:6px 3px;
  text-align:center;color:var(--ink-mut);border:1px solid transparent;border-bottom:none;border-radius:4px 4px 0 0;transition:.15s}
.tree-tab.on{color:var(--holo);border-color:var(--edge2);background:var(--panel2)}
.tree-body{padding:5px 3px 30px}
.trow{display:flex;align-items:center;gap:6px;padding:4px 7px;border-radius:4px;cursor:pointer;font-size:12px;
  font-family:var(--disp);font-weight:500;color:var(--ink-dim);transition:.1s}
.trow:hover{background:#e9eef3;color:var(--ink)}
.trow.sel{background:#dbe8f4;color:var(--holo)}
.trow .car{width:11px;font-size:8px;color:var(--ink-mut);transition:transform .15s;flex-shrink:0}
.trow.collapsed .car{transform:rotate(-90deg)}
.trow .ico{width:15px;height:15px;flex-shrink:0;color:var(--holo-dim)}
.trow.sel .ico{color:var(--holo)}
.trow .cnt{margin-left:auto;font-family:var(--mono);font-size:8.5px;color:var(--ink-mut);background:var(--panel2);padding:0 5px;border-radius:8px}
.tchild{margin-left:11px;border-left:1px solid var(--edge2)}
.tchild.hid{display:none}
.leaf{font-family:var(--mono);font-size:10px;letter-spacing:.02em;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sys-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.tag-lg{font-family:var(--mono);font-size:8.5px;color:var(--ink-mut);padding:4px 8px 2px;letter-spacing:.04em}

/* ── canvas (drafting sheet) ── */
#canvas{grid-area:canvas;position:relative;overflow:hidden;background:#fcfcfd;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px),
    linear-gradient(var(--grid2) 1px,transparent 1px),linear-gradient(90deg,var(--grid2) 1px,transparent 1px);
  background-size:96px 96px,96px 96px,24px 24px,24px 24px}
#svglinks{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2}
#nodes{position:absolute;inset:0;z-index:3}
/* ── equipment block (flat, technical) ── */
.node{position:absolute;transform:translate(-50%,-50%);cursor:grab;user-select:none;display:flex;flex-direction:column;
  align-items:center;gap:3px;z-index:4;--sc:var(--holo)}
.node:active{cursor:grabbing}
.node .sym{width:46px;height:38px;display:grid;place-items:center;position:relative;color:var(--sc);
  background:#fff;border:1px solid var(--edge);border-top:3px solid var(--sc);border-radius:2px}
.node .sym svg{width:23px;height:23px}
.node.sel .sym{border-color:var(--sc);box-shadow:0 0 0 2px var(--sc);background:#eef4fa}
.node .lbl{font-family:var(--mono);font-weight:500;font-size:9.5px;letter-spacing:.01em;color:var(--ink);text-align:center;
  white-space:nowrap;line-height:1.15;text-shadow:0 0 3px #fcfcfd,0 0 3px #fcfcfd}
.node .lbl small{display:block;font-family:var(--body);font-weight:400;font-size:8px;color:var(--ink-dim);letter-spacing:.01em}
.node .badge{position:absolute;top:-6px;right:-8px;font-family:var(--mono);font-size:7.5px;background:#fff;border:1px solid var(--edge);
  color:var(--ink-dim);border-radius:2px;padding:0 3px;z-index:5}
.node .kw{position:absolute;bottom:-6px;left:-8px;font-family:var(--mono);font-size:7.5px;background:#fff;border:1px solid var(--edge);
  color:var(--amber);border-radius:2px;padding:0 3px;z-index:5}
#reticle{position:absolute;width:66px;height:56px;transform:translate(-50%,-50%);pointer-events:none;z-index:3;opacity:0;transition:opacity .15s}
#reticle.on{opacity:1}
#reticle .r{position:absolute;width:9px;height:9px;border:1.5px solid var(--holo)}
#reticle .r:nth-child(1){left:0;top:0;border-right:0;border-bottom:0}
#reticle .r:nth-child(2){right:0;top:0;border-left:0;border-bottom:0}
#reticle .r:nth-child(3){left:0;bottom:0;border-right:0;border-top:0}
#reticle .r:nth-child(4){right:0;bottom:0;border-left:0;border-top:0}
#reticle .dot{display:none}

#legend{position:absolute;left:10px;top:10px;z-index:9;display:flex;flex-direction:column;gap:3px;max-width:150px}
.leg{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:9px;letter-spacing:.03em;padding:4px 8px;
  background:#fff;border:1px solid var(--edge);border-radius:4px;color:var(--ink-dim);cursor:pointer;transition:.15s;text-transform:uppercase;user-select:none}
.leg.off{opacity:.4}
.leg .sw{width:14px;height:3px;border-radius:1px;flex-shrink:0}
.leg .k{margin-left:auto;color:var(--ink-mut);font-size:8px}
#cstats{position:absolute;right:10px;top:10px;z-index:9;background:#fff;border:1px solid var(--edge);border-radius:6px;
  padding:8px 10px;font-family:var(--mono);font-size:9px;color:var(--ink-dim);letter-spacing:.03em;min-width:150px}
#cstats .r{display:flex;justify-content:space-between;padding:1.5px 0}
#cstats .r b{color:var(--ink);font-weight:600}
#cstats .hd{color:var(--holo-dim);text-transform:uppercase;font-size:8px;letter-spacing:.09em;margin-bottom:3px}

#bubble{position:absolute;transform:translate(-50%,12px);z-index:8;min-width:210px;max-width:250px;
  background:#fff;border:1px solid var(--edge);border-radius:6px;
  padding:9px 11px;box-shadow:0 6px 20px rgba(30,40,50,.18);pointer-events:auto;display:none;font-size:11px}
#bubble.on{display:block}
#bubble .bt{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;color:var(--holo);text-transform:uppercase}
#bubble h4{font-family:var(--disp);font-size:13px;margin:1px 0 3px;color:var(--ink)}
#bubble .brow2{display:grid;grid-template-columns:1fr 1fr;gap:3px 8px;font-family:var(--mono);font-size:9px;color:var(--ink-dim);margin:4px 0}
#bubble .brow2 b{color:var(--ink)}
#bubble .brow{display:flex;gap:5px;margin-top:6px}
#bubble .bmini{flex:1;font-family:var(--mono);font-size:8.5px;text-align:center;padding:5px 3px;border-radius:4px;border:1px solid var(--edge2);color:var(--ink-dim);transition:.15s}
#bubble .bmini:hover{border-color:var(--holo);color:var(--holo)}

#crumb{position:absolute;left:50%;top:10px;transform:translateX(-50%);z-index:9;display:none;font-family:var(--mono);font-size:9.5px;
  letter-spacing:.05em;background:#fff;border:1px solid var(--edge);border-radius:16px;padding:5px 13px;color:var(--ink-dim)}
#crumb.on{display:flex;align-items:center;gap:7px}
#crumb b{color:var(--holo)}#crumb .x{color:var(--amber);cursor:pointer}#crumb a{color:var(--ink-dim);cursor:pointer}#crumb a:hover{color:var(--holo)}

#cbar{position:absolute;right:10px;bottom:10px;z-index:9;display:flex;gap:5px}
.cbtn{width:30px;height:30px;display:grid;place-items:center;background:#fff;border:1px solid var(--edge);border-radius:5px;color:var(--ink-dim);transition:.15s}
.cbtn:hover{border-color:var(--holo);color:var(--holo)}.cbtn svg{width:15px;height:15px}
#palette{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);z-index:9;display:flex;gap:4px;background:#fff;
  border:1px solid var(--edge);border-radius:8px;padding:5px;max-width:calc(100% - 220px);overflow-x:auto}
.pchip{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 7px;border-radius:5px;min-width:54px;transition:.15s;color:var(--ink-dim)}
.pchip:hover{background:#eaf1f8;color:var(--holo)}
.pchip svg{width:18px;height:18px}
.pchip span{font-family:var(--mono);font-size:7.5px;letter-spacing:.02em;text-align:center;line-height:1.1}
#toast{position:absolute;right:10px;bottom:50px;z-index:12;width:238px}
.toastcard{background:#fff;border:1px solid var(--edge);border-radius:6px;
  padding:8px 10px;font-size:11px;color:var(--ink);margin-top:7px;position:relative;box-shadow:0 4px 14px rgba(30,40,50,.16);animation:tin .3s ease}
@keyframes tin{from{transform:translateX(24px);opacity:0}}
.toastcard.warn{border-color:#d8ab6f}.toastcard.err{border-color:#d69494}
.toastcard .x{position:absolute;right:6px;top:4px;color:var(--ink-mut);cursor:pointer;font-size:12px}
.toastcard .th{font-family:var(--mono);font-size:8px;letter-spacing:.05em;text-transform:uppercase;color:var(--holo);margin-bottom:2px}
.toastcard.warn .th{color:var(--amber)}.toastcard.err .th{color:var(--red)}
.emptyc{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none}
.emptyc div{text-align:center;color:var(--ink-mut);font-family:var(--mono);font-size:11px;letter-spacing:.05em;line-height:1.8}
.emptyc b{color:var(--holo)}

/* ── right panel ── */
#panel{grid-area:panel;background:var(--panel);border-left:1px solid var(--edge);overflow-y:auto;z-index:20;display:flex;flex-direction:column}
.ptabs{display:flex;padding:7px 6px 0;gap:2px;position:sticky;top:0;background:var(--panel);z-index:5}
.ptab{flex:1;height:32px;display:grid;place-items:center;border-radius:5px 5px 0 0;color:var(--ink-mut);border:1px solid transparent;border-bottom:none;transition:.15s}
.ptab svg{width:16px;height:16px}
.ptab.on{color:var(--holo);background:var(--panel2);border-color:var(--edge2)}
.ptab:hover:not(.on){color:var(--ink)}
.pbody{padding:10px 11px 30px;flex:1}
.pv{display:none}.pv.on{display:block}
.plabel{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--holo-dim);margin:13px 0 5px;display:flex;align-items:center;gap:6px}
.plabel::after{content:"";flex:1;height:1px;background:var(--edge2)}
.plabel:first-child{margin-top:1px}
.plabel .pl-act{font-size:8px;color:var(--amber);cursor:pointer;letter-spacing:.03em}
.pcard{background:#fff;border:1px solid var(--edge2);border-radius:6px;padding:9px 10px;margin-bottom:7px}
.pnode{font-family:var(--disp);font-size:18px;font-weight:700;color:var(--ink);line-height:1}
.pnode small{display:block;font-family:var(--mono);font-size:9.5px;color:var(--ink-dim);font-weight:400;letter-spacing:.03em;margin-top:3px}
.dl{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-family:var(--mono);font-size:10.5px;line-height:1.5}
.dl dt{color:var(--ink-mut);white-space:nowrap}
.dl dd{color:var(--ink);text-align:right}
.dl dd b{color:var(--holo);font-weight:600}
.dl dd.a{color:var(--amber)}.dl dd.g{color:var(--green)}
.iogrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.iocell{background:#fff;border:1px solid var(--edge2);border-radius:5px;padding:6px 8px;display:flex;align-items:center;gap:7px}
.iocell .n{font-family:var(--mono);font-size:17px;color:var(--ink);font-weight:600;line-height:1;min-width:26px;text-align:right}
.iocell .m{font-family:var(--mono);font-size:8px;letter-spacing:.04em;color:var(--ink-dim);text-transform:uppercase;line-height:1.2}
.iocell .adj{margin-left:auto;display:flex;flex-direction:column;gap:2px}
.iocell .adj button{width:15px;height:12px;font-size:9px;line-height:1;color:var(--ink-mut);border:1px solid var(--edge2);border-radius:3px}
.iocell .adj button:hover{color:var(--holo);border-color:var(--holo)}
.mini-t{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:9.5px;margin-top:2px}
.mini-t td{padding:2.5px 3px;border-bottom:1px solid var(--edge2);color:var(--ink)}
.mini-t td.q{text-align:right;color:var(--ink);font-weight:600}.mini-t td.p{text-align:right;color:var(--ink-mut)}
.pill{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:8.5px;letter-spacing:.03em;padding:2px 7px;border-radius:3px;border:1px solid var(--edge);color:var(--ink-dim);margin:2px 3px 2px 0}
.pill.g{border-color:var(--green);color:var(--green)}.pill.a{border-color:var(--amber);color:var(--amber)}.pill.v{border-color:var(--violet);color:var(--violet)}
.plink{font-family:var(--mono);font-size:9.5px;color:var(--amber);letter-spacing:.03em;cursor:pointer;display:inline-block;margin-top:5px;text-transform:uppercase}
.plink:hover{color:#7a4d17}
.big{font-family:var(--disp);font-size:23px;font-weight:700;line-height:1;color:var(--ink)}
.big.g{color:var(--green)}
.big small{font-size:10px;color:var(--ink-dim);font-family:var(--mono);font-weight:400}
.barrow{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:9.5px;margin:4px 0}
.barrow .lab{width:74px;color:var(--ink-dim);text-transform:uppercase;font-size:8.5px}
.barrow .track{flex:1;height:6px;background:var(--edge2);border-radius:3px;overflow:hidden}
.barrow .track i{display:block;height:100%;border-radius:3px}
.barrow .val{width:42px;text-align:right;color:var(--ink)}
.denstoggle{display:flex;border:1px solid var(--edge2);border-radius:4px;overflow:hidden}

.setrow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:6px 0;font-family:var(--mono);font-size:10px}
.setrow label{color:var(--ink-dim)}
.setrow input{width:76px;background:#fff;border:1px solid var(--edge2);border-radius:4px;color:var(--ink);font-family:var(--mono);

.setrow input:focus{outline:none;border-color:var(--holo)}
.vrow{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--edge2);font-size:11px}
.vrow .gen{flex:1;color:var(--ink)}.vrow .arr{color:var(--holo-dim)}.vrow .pn{font-family:var(--mono);font-size:9.5px;color:var(--holo);text-align:right;min-width:92px}
.vendor-sel{display:flex;gap:3px;margin:5px 0 8px}
.vendor-sel button{flex:1;font-family:var(--mono);font-size:9px;padding:6px 3px;border:1px solid var(--edge2);border-radius:4px;color:var(--ink-dim);transition:.15s;background:#fff}
.vendor-sel button.on{background:#dbe8f4;color:var(--holo);border-color:var(--holo-dim)}
.audit{font-family:var(--mono);font-size:9px;line-height:1.6;color:var(--ink-dim)}
.audit .a-row{display:flex;gap:7px;padding:2.5px 0;border-bottom:1px solid var(--edge2)}
.audit .ts{color:var(--ink-mut);flex-shrink:0}.audit .ac{color:var(--holo)}.audit .ac.del{color:var(--red)}.audit .ac.cfg{color:var(--amber)}

/* ── schedules dock ── */
#dock{grid-area:dock;background:var(--panel);border-top:1px solid var(--edge);display:flex;flex-direction:column;z-index:25;overflow:hidden}
.dock-h{display:flex;align-items:stretch;background:var(--bg1);border-bottom:1px solid var(--edge);flex-shrink:0}
.dock-tabs{display:flex;overflow-x:auto;flex:1}
.dtab{font-family:var(--mono);font-size:9.5px;letter-spacing:.03em;text-transform:uppercase;padding:9px 13px;color:var(--ink-mut);
  white-space:nowrap;border-right:1px solid var(--edge2);transition:.15s;display:flex;align-items:center;gap:6px}
.dtab:hover{color:var(--ink)}
.dtab.on{color:var(--holo);background:var(--panel2);box-shadow:inset 0 -2px 0 var(--holo)}
.dtab .c{font-size:8px;color:var(--ink-mut);background:var(--panel2);padding:0 5px;border-radius:8px}
.dtab.on .c{color:var(--holo)}
.dock-tools{display:flex;align-items:center;gap:3px;padding:0 8px;border-left:1px solid var(--edge2)}
.dtool{width:28px;height:28px;display:grid;place-items:center;color:var(--ink-mut);border-radius:5px;transition:.15s}
.dtool:hover{color:var(--holo);background:#e6edf4}.dtool svg{width:15px;height:15px}
.dock-b{flex:1;overflow:auto;position:relative;background:#fff}
body.dock-min .dock-b{display:none}
.filterbar{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--edge2);position:sticky;top:0;background:var(--panel);z-index:3;font-family:var(--mono);font-size:9.5px;color:var(--ink-dim)}
.filterbar input{background:#fff;border:1px solid var(--edge2);border-radius:4px;color:var(--ink);font-family:var(--mono);font-size:10px;padding:4px 8px;width:180px}
.filterbar input:focus{outline:none;border-color:var(--holo)}
.filterbar .sum{margin-left:auto;color:var(--ink-mut)}
.filterbar .sum b{color:var(--holo);font-weight:600}
table.sched{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10px}
table.sched thead th{position:sticky;top:0;background:var(--bg1);text-align:left;color:var(--ink-dim);font-weight:600;letter-spacing:.03em;
  font-size:8.5px;text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--edge);white-space:nowrap;cursor:pointer;z-index:2}
table.sched thead th:hover{color:var(--holo)}
table.sched thead th.num,table.sched td.num{text-align:right}
table.sched tbody td{padding:4px 8px;border-bottom:1px solid var(--edge2);color:var(--ink);white-space:nowrap}
table.sched tbody tr:nth-child(even){background:#fafbfc}
table.sched tbody tr:hover{background:#eaf1f8}
table.sched tbody tr.sel{background:#dbe8f4}
table.sched td.tag{color:var(--holo);font-weight:600}
table.sched td.dim{color:var(--ink-mut)}
table.sched td.a{color:var(--amber)}table.sched td.g{color:var(--green)}table.sched td.r{color:var(--red)}
table.sched td .chip2{font-size:8px;padding:0 5px;border-radius:7px;border:1px solid var(--edge2);color:var(--ink-dim)}
table.sched .grp td{background:#f6efe4;color:var(--amber);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;padding-top:7px;padding-bottom:5px;position:sticky}
table.sched tfoot td{padding:7px 8px;border-top:2px solid var(--edge);color:var(--green);font-weight:600;font-size:10.5px;position:sticky;bottom:0;background:var(--bg1)}
table.sched tfoot td.lbl{color:var(--ink-dim);font-weight:400}
.costsum{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px}
.costcard{background:#fff;border:1px solid var(--edge2);border-radius:6px;padding:10px 12px}
.costcard .l{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-mut)}
.costcard .v{font-family:var(--disp);font-size:19px;font-weight:700;color:var(--ink);margin-top:3px}
.costcard.tot .v{color:var(--green)}
.costcard .s{font-family:var(--mono);font-size:8.5px;color:var(--ink-dim);margin-top:2px}

/* ── modal ── */
#scrim{position:fixed;inset:0;background:rgba(24,30,38,.45);z-index:100;display:none;place-items:center;padding:18px}
#scrim.on{display:grid}
.modal{width:min(760px,100%);max-height:92vh;overflow-y:auto;background:#fff;

.modal-h h2{font-family:var(--disp);font-size:17px;font-weight:700;color:var(--ink)}
.modal-h p{font-family:var(--mono);font-size:9px;color:var(--ink-dim);letter-spacing:.04em;margin-top:1px}
.modal-h .x{margin-left:auto;font-size:19px;color:var(--ink-mut);cursor:pointer}
.modal-b{padding:14px 18px}
.fld{margin-bottom:13px}
.fld>label{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--holo-dim);margin-bottom:5px}
.fld input[type=text],.fld input[type=number],.fld select{width:100%;background:#fff;border:1px solid var(--edge2);border-radius:4px;
  padding:8px 10px;color:var(--ink);font-family:var(--body);font-size:13px}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--holo);box-shadow:0 0 0 2px rgba(47,111,168,.14)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--mono);font-size:10px;letter-spacing:.02em;padding:6px 10px;border:1px solid var(--edge2);border-radius:16px;color:var(--ink-dim);cursor:pointer;transition:.15s;user-select:none;background:#fff}
.chip:hover{border-color:var(--edge);color:var(--ink)}
.chip.on{background:#dbe8f4;color:var(--holo);border-color:var(--holo)}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tlib{display:flex;flex-direction:column;gap:9px}
.tgroup .tgh{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--holo-dim);margin:2px 0 5px;display:flex;align-items:center;gap:6px}
.tgroup .tgh .sd{width:8px;height:8px;border-radius:2px}
.nodepick{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:6px}
.npk{border:1px solid var(--edge2);border-radius:6px;padding:7px;cursor:pointer;transition:.15s;text-align:center;color:var(--ink-dim);position:relative;background:#fff}
.npk:hover{border-color:var(--edge);color:var(--ink)}
.npk.on{border-color:var(--holo);background:#eef4fa;color:var(--holo)}
.npk svg{width:22px;height:22px;margin-bottom:2px}
.npk .nm{font-family:var(--disp);font-size:11px;font-weight:600;line-height:1.05}
.npk .io{font-family:var(--mono);font-size:7.5px;color:var(--ink-mut);margin-top:2px}
.npk .qty{font-family:var(--mono);font-size:8.5px;color:var(--amber);margin-top:3px;display:none}
.npk.on .qty{display:block}
.npk .qty input{width:34px;background:#fff;border:1px solid var(--edge2);border-radius:4px;color:var(--amber);font-family:var(--mono);font-size:9px;text-align:center;padding:1px}
.modal-f{padding:12px 18px;border-top:1px solid var(--edge2);display:flex;gap:9px;justify-content:flex-end;align-items:center}
.modal-f .note{margin-right:auto;font-family:var(--mono);font-size:9px;color:var(--ink-dim);max-width:48ch;line-height:1.4}

#mwarn{display:none}
@media (max-width:960px){
  #app{display:none}
  #mwarn{display:grid;place-items:center;height:100vh;padding:28px;text-align:center}
  #mwarn div{max-width:340px}#mwarn .cube{color:var(--holo);font-size:40px}
  #mwarn h1{font-family:var(--disp);font-size:22px;margin:12px 0 8px;color:var(--ink)}
  #mwarn p{color:var(--ink-dim);line-height:1.6;font-size:14px}
}
.back{position:fixed;left:calc(var(--railW) + 8px);bottom:6px;z-index:60;font-family:var(--mono);font-size:8.5px;letter-spacing:.05em;
  color:var(--ink-mut);text-decoration:none;text-transform:uppercase}
.back:hover{color:var(--holo)}
</style>

<body>
<div id="mwarn"><div><div class="cube">◈</div><h1>DCSketch</h1>
  <p>This is a desktop-class engineering workbench — point-level I/O, load &amp; cable schedules, and line-item costing need room. Open on a screen ≥960px wide.</p></div></div>

<div id="app">

  <nav id="rail">

    <div class="rail-ic on" data-tip="I/O List" data-dock="io"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h16M4 12h16M4 18h16"/><circle cx="8" cy="6" r="1.3" fill="currentColor"/><circle cx="14" cy="12" r="1.3" fill="currentColor"/></svg></div>

  </nav>

  <aside id="tree"></aside>

  <main id="canvas">

    <div id="reticle"><div class="r"></div><div class="r"></div><div class="r"></div><div class="r"></div></div>

    <div id="cbar">
      <button class="cbtn" data-act="fit" title="Fit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>

  <aside id="panel">

  </section>
</div>

<div id="scrim"><div class="modal" id="modal"></div></div>

"use strict";
/* ═══════════════════════════════════════════════════════════════════════
   DCSketch v2 — SCADA/DCS architecture & estimation workbench

/* ═══════════ POINT-LEVEL I/O GENERATION ═══════════════════════════ */
const POOL={
 di:['Run Status','Fault Alarm','Remote/Auto Mode','High-High Level','Low Level Switch','E-Stop Status','Phase Loss','Ready to Start','Filter DP Switch','Vibration Trip','Breaker Closed','Aux Contact','Local/Off/Remote','Overtemp Trip','Flow Proven'],
 do:['Start Command','Stop Command','Fault Reset','Alarm Horn','Trip Command','Enable Output','Beacon/Strobe','Bypass Command','Open Command','Close Command'],
 ai:['Discharge Temp','Suction Pressure','Flow Rate','Level','Motor Current','Bus Voltage','Speed Feedback','Differential Pressure','Return Air Temp','Supply Air Temp','Humidity','Power (kW)','Bearing Temp','Valve Position Fb'],
 ao:['Speed Reference','Valve Position Cmd','Damper Position','Setpoint Output','VFD Frequency Cmd'],
};
function sigMeta(sig,desc,onPower){
  const d=desc.toLowerCase();
  if(sig==='di')return{type:'24VDC DI',range:'Discrete',eu:'—',alarm:/trip|fault|e-stop|high|low|loss|overtemp/.test(d)?'Alarm':'Status'};
  if(sig==='do')return{type:/trip|alarm|beacon|horn/.test(d)?'Relay DO':'24VDC DO',range:'Discrete',eu:'—',alarm:'—'};
  if(sig==='ao')return{type:'4–20mA AO',range:'0–100',eu:'%',alarm:'—'};
  // ai
  let range='0–100',eu='%',type='4–20mA AI';
  if(/temp/.test(d)){range='32–150';eu='°F';type='RTD Pt100';}
  else if(/pressure|dp|differential/.test(d)){range='0–150';eu='psi';type='4–20mA HART';}
  else if(/flow/.test(d)){range='0–500';eu='gpm';type='4–20mA HART';}
  else if(/level/.test(d)){range='0–100';eu='%';type='4–20mA HART';}
  else if(/current/.test(d)){range='0–2000';eu='A';type='Modbus';}
  else if(/voltage/.test(d)){range='0–600';eu='V';type='Modbus';}
  else if(/power|kw/.test(d)){range='0–2500';eu='kW';type='Modbus';}
  else if(/humid/.test(d)){range='0–100';eu='%RH';type='4–20mA';}
  else if(/speed|position/.test(d)){range='0–100';eu='%';type='4–20mA';}
  const alarm=/temp|pressure|level|current/.test(d)?(desc.charCodeAt(0)%2?'H / HH':'L / LL'):'—';
  return{type,range,eu,alarm};
}
function genPoints(node){
  const io=node.io, out=[], T=TYPES[node.type], onPower=T.system==='power';
  const pool=s=>(T.pts&&T.pts[s])||POOL[s];
  // rack/slot/channel address packing
  const rackTag=node.tag;
  const seq={di:0,do:0,ai:0,ao:0};
  const cardCap={di:16,do:16,ai:8,ao:8};
  const push=(sig,i)=>{
    const p=pool(sig), desc=p[i%p.length], m=sigMeta(sig,desc,onPower);
    const slot=Math.floor(i/cardCap[sig]), ch=i%cardCap[sig];
    out.push({tag:`${node.tag}_${sig.toUpperCase()}${String(i+1).padStart(3,'0')}`,
      desc:`${node.name} — ${desc}`, system:T.system, sig:m.type, range:m.range, eu:m.eu, alarm:m.alarm,
      addr:`${rackTag}:${sig.toUpperCase()[0]}${slot+1}:${String(ch).padStart(2,'0')}`, node:node.tag});
  };
  for(let i=0;i<io.di;i++)push('di',i);
  for(let i=0;i<io.do;i++)push('do',i);
  for(let i=0;i<io.ai;i++)push('ai',i);
  for(let i=0;i<io.ao;i++)push('ao',i);
  return out;
}

/* ═══════════ ELECTRICAL MODEL ═════════════════════════════════════ */
const STD_BKR=[15,20,25,30,35,40,45,50,60,70,80,90,100,110,125,150,175,200,225,250,300,350,400,450,500,600,700,800,1000,1200,1600,2000,2500,3000,4000];
const AMPACITY=[[15,'#14'],[20,'#12'],[30,'#10'],[40,'#8'],[55,'#6'],[70,'#4'],[85,'#3'],[95,'#2'],[110,'#1'],[125,'1/0'],[145,'2/0'],[165,'3/0'],[195,'4/0'],[215,'250'],[240,'300'],[260,'350'],[280,'400'],[320,'500'],[380,'600'],[420,'750'],[475,'2×250'],[560,'2×350'],[640,'2×500'],[760,'2×750'],[1200,'4×600']];
function breakerFor(fla){const t=fla*1.25;return STD_BKR.find(b=>b>=t)||4000;}
function conductorFor(amp){const r=AMPACITY.find(x=>x[0]>=amp);return r?r[1]+' Cu':'busway';}
function flaOf(n){const T=TYPES[n.type];if(T.fla)return Math.round(T.fla*(n.qty||1));
  if(T.kw&&T.volts){const f=T.phase===3?T.kw*1000/(1.732*T.volts*0.9):T.kw*1000/(T.volts*0.9);return Math.round(f*(n.qty||1));}return 0;}
function elecOf(n){const T=TYPES[n.type];const fla=flaOf(n);const bkr=fla?breakerFor(fla):0;
  return{volts:T.volts,phase:T.phase,kw:Math.round(T.kw*(n.qty||1)),fla,drive:T.drive,breaker:bkr,feeder:fla?conductorFor(bkr):'—'};}

function fieldNodes(){return state.nodes.filter(n=>ioTotal(n.io)>0);}
function buildIO(){const rows=[];fieldNodes().forEach(n=>genPoints(n).forEach(p=>rows.push(p)));return rows;}
function buildInstr(){const rows=[];state.nodes.forEach(n=>{const T=TYPES[n.type];(T.instr||[]).forEach((ins,i)=>{
  rows.push({tag:`${n.tag}-I${i+1}`,type:ins,service:n.name,system:T.system,sig:/rtd|temp/i.test(ins)?'RTD':/hart|meter|tx|pressure|flow|level/i.test(ins)?'HART':'Discrete',node:n.tag});});});return rows;}
function buildLoad(){return state.nodes.map(n=>{const e=elecOf(n);if(!e.fla&&!e.kw)return null;
  const demand=Math.round(e.kw*0.85);
  return{tag:n.tag,desc:n.name,volts:e.volts?`${e.volts>=1000?(e.volts/1000)+'kV':e.volts+'V'}/${e.phase}Φ`:'—',
    kw:e.kw,fla:e.fla,demand,breaker:e.breaker?e.breaker+'A':'—',feeder:e.feeder,drive:e.drive||'—',system:TYPES[n.type].system};}).filter(Boolean);}
function buildPanels(){return state.nodes.filter(n=>['control','safety'].includes(TYPES[n.type].system)||ioTotal(n.io)>0).map(n=>{
  const c=cardsFor(n.io),T=TYPES[n.type];
  return{tag:n.tag,desc:n.name,nema:T.nema,di:c.di,do:c.do,ai:c.ai,ao:c.ao,cards:c.di+c.do+c.ai+c.ao,
    cpu:T.redundant?'Redundant':(TYPES[n.type].system==='control'?'Simplex':'RIO'),pts:withSpace(n)};});}
function withSpace(n){return withSpare(ioTotal(n.io));}
function buildCable(){const box=$('#canvas').getBoundingClientRect();return state.links.map((l,i)=>{
  const a=state.nodes.find(x=>x.id===l.a),b=state.nodes.find(x=>x.id===l.b);if(!a||!b)return null;
  const dx=(a.nx-b.nx)*(box.width||1200),dy=(a.ny-b.ny)*(box.height||700);
  const len=Math.max(25,Math.round(Math.hypot(dx,dy)/6)*5);
  const map={power:['Power Feeder','600V THHN'],cooling:['Control','600V TC'],control:['Control','600V TC'],
    network:['Network','OM4 Fiber / Cat6A'],safety:['Fire/Signal','FPLP'],process:['Instrument','16AWG TSP']};
  const m=map[l.layer]||['Control','600V TC'];
  let size='—';if(l.layer==='power'){const e=elecOf(a).fla||elecOf(b).fla;size=e?conductorFor(breakerFor(e)):'#2 Cu';}
  return{tag:`C-${String(i+1).padStart(3,'0')}`,from:a.tag,to:b.tag,type:m[0],cable:m[1],size:size,len:len+' ft',system:l.layer};}).filter(Boolean);}

function estimate(){
  const R=state.rates,field=fieldNodes();
  let DI=0,DO=0,AI=0,AO=0;field.forEach(n=>{DI+=n.io.di;DO+=n.io.do;AI+=n.io.ai;AO+=n.io.ao;});
  const physical=DI+DO+AI+AO,engineered=withSpare(physical);
  let cDI=0,cDO=0,cAI=0,cAO=0;field.forEach(n=>{const c=cardsFor(n.io);cDI+=c.di;cDO+=c.do;cAI+=c.ai;cAO+=c.ao;});
  const totalCards=cDI+cDO+cAI+cAO;
  const redMult={'Simplex':1,'Dual-Hot Standby':2,'TMR (Triple Modular)':3}[state.project.redundancy]||1;
  const ctrlPanels=state.nodes.filter(n=>TYPES[n.type].system==='control'&&/panel|plc/.test(n.type)).length||1;
  const panels=Math.max(ctrlPanels,Math.ceil(engineered/512));
  const cpus=panels*redMult;
  const drops=Math.max(field.length,Math.ceil(totalCards/8));
  const switches=state.nodes.filter(n=>/switch/.test(n.type)).reduce((s,n)=>s+n.qty,0)||Math.ceil(drops/6)+1;
  const vfds=state.nodes.filter(n=>TYPES[n.type].drive==='VFD').reduce((s,n)=>s+n.qty,0);
  const instruments=buildInstr().length;
  const tags=Math.round(engineered*2.6);
  const tier=tags<=500?'500':tags<=1500?'1,500':tags<=5000?'5,000':'Unlimited';
  const clients=Math.max(2,Math.ceil(field.length/3));
  const drivers=Math.max(1,Math.ceil(drops/4));
  const nema=/Div/.test(state.project.hazardous)?'7 (XP)':/Wash|Wet/.test(state.project.hazardous)?'4X':'12';
  // ── line-item cost model
  const lines=[];
  const add=(grp,item,qty,unit,matEa,labHrs,rate)=>lines.push({grp,item,qty,unit,mat:matEa*qty,lab:labHrs*qty*rate,labHrs:labHrs*qty});
  // hardware per node family
  state.nodes.forEach(n=>{const T=TYPES[n.type],c=cardsFor(n.io);
    if(T.hwCost)add('Field & Server Hardware',T.label,n.qty,'ea',T.hwCost,0,0);
    const cardMat=c.di*CARDCOST.di+c.do*CARDCOST.do+c.ai*CARDCOST.ai+c.ao*CARDCOST.ao;
    if(cardMat)add('I/O & Controllers',`${n.tag} I/O cards`,1,'lot',cardMat,0,0);

  add('Field Devices','VFDs / soft-starters',vfds,'ea',3600,0,0);
  add('Field Devices','Instruments',instruments,'ea',1250,0,0);
  // labor
  let engHrs=0,instHrs=0;state.nodes.forEach(n=>{const T=TYPES[n.type];engHrs+=T.engHrs*n.qty;instHrs+=T.instHrs*n.qty;});
  add('Engineering & Design','System / detailed design',Math.round(engHrs),'hr',0,1,R.eng);
  add('Programming & Integration','PLC/SCADA programming',engineered,'pt',0,0,0);lines[lines.length-1].lab=engineered*R.prog;lines[lines.length-1].labHrs=Math.round(engineered*R.prog/R.eng);
  add('Installation & Wiring','Panel build & field wiring',Math.round(instHrs),'hr',0,1,R.elec);
  add('Commissioning','Point-to-point & loop check',engineered,'pt',0,0,0);lines[lines.length-1].lab=engineered*R.commission;lines[lines.length-1].labHrs=Math.round(engineered*R.commission/R.elec);
  // licensing
  const licTier={'500':6000,'1,500':14000,'5,000':32000,'Unlimited':58000}[tier];
  add('Software & Licensing',`HMI/SCADA ${tier}-tag`,1,'lic',licTier,0,0);
  add('Software & Licensing','Historian',1,'lic',tags>1500?24000:9000,0,0);
  add('Software & Licensing','Client access licenses',clients,'ea',1200,0,0);
  add('Software & Licensing','OPC-UA / drivers',drivers,'ea',2400,0,0);
  // rollup
  const mat=lines.reduce((s,l)=>s+l.mat,0), lab=lines.reduce((s,l)=>s+l.lab,0), labHrs=lines.reduce((s,l)=>s+(l.labHrs||0),0);
  const sub=mat+lab, freight=mat*R.freight, contingency=sub*R.contingency, markup=sub*R.markup;
  const pretax=sub+freight+contingency+markup, tax=(mat+freight)*R.tax, total=pretax+tax;
  return{DI,DO,AI,AO,physical,engineered,cDI,cDO,cAI,cAO,totalCards,drops,panels,cpus,switches,vfds,instruments,
    tags,tier,clients,drivers,nema,redMult,lines,mat,lab,labHrs,sub,freight,contingency,markup,tax,total,engHrs,instHrs};
}

function drillChildren(n){const c=cardsFor(n.io),items=[{icon:'comm',label:'COMM',sub:'ETHERNET/IP'}];
  for(let i=0;i<c.di;i++)items.push({icon:'di',label:'DI',sub:`16-pt DI-${i+1}`});
  for(let i=0;i<c.do;i++)items.push({icon:'do',label:'DO',sub:`16-pt DO-${i+1}`});
  for(let i=0;i<c.ai;i++)items.push({icon:'ai',label:'AI',sub:`8-pt AI-${i+1}`});
  for(let i=0;i<c.ao;i++)items.push({icon:'ao',label:'AO',sub:`8-pt AO-${i+1}`});
  items.push({icon:'cpu',label:'CPU',sub:state.project.redundancy.split(' ')[0]});
  const R=0.30;return items.map((card,i)=>{const a=(i/items.length)*Math.PI*2-Math.PI/2;
    return{n,x:0.5+Math.cos(a)*R*1.4,y:0.5+Math.sin(a)*R,card};});}
const NS='http://www.w3.org/2000/svg';
function mkpath(d,col,w,op,dash){const p=document.createElementNS(NS,'path');p.setAttribute('d',d);p.setAttribute('stroke',col);
  p.setAttribute('stroke-width',w);p.setAttribute('fill','none');p.setAttribute('opacity',op);p.setAttribute('stroke-linejoin','round');
  if(dash)p.setAttribute('stroke-dasharray',dash);return p;}
// orthogonal (Manhattan) route between two node centres, offset below the block
function ortho(A,B){const ay=A[1]+22,by=B[1]-22; // exit bottom of A, enter top of B
  if(Math.abs(B[0]-A[0])<8)return `M${A[0]} ${ay} L${B[0]} ${by}`;
  const my=(ay+by)/2;
  return `M${A[0]} ${ay} L${A[0]} ${my} L${B[0]} ${my} L${B[0]} ${by}`;}
function drawLinks(drill){const svg=$('#svglinks'),box=$('#canvas').getBoundingClientRect();
  [...svg.querySelectorAll('path,rect')].forEach(e=>e.remove());
  if(drill){const cx=0.5*box.width,cy=0.5*box.height;drillChildren(drill).forEach(it=>{
    svg.appendChild(mkpath(`M${cx} ${cy} L${it.x*box.width} ${it.y*box.height}`,'var(--holo-dim)',1,.5,'2 4'));});return;}
  const pos={};state.nodes.forEach(n=>pos[n.id]=[n.nx*box.width,n.ny*box.height]);
  state.links.forEach(l=>{if(state.sysOff.has(l.layer))return;const A=pos[l.a],B=pos[l.b];if(!A||!B)return;
    const col=SYS[l.layer].color,hot=state.sel&&(l.a===state.sel||l.b===state.sel);
    const top=A[1]<=B[1]?A:B, bot=A[1]<=B[1]?B:A;
    svg.appendChild(mkpath(ortho(top,bot),col,hot?1.9:1.2,hot?.95:.55));});}

function makeDraggable(dom,n){let sx,sy,ox,oy,moved;
  const down=e=>{if(linking){finishLink(n.id);return;}e.preventDefault();sx=e.clientX;sy=e.clientY;ox=n.nx;oy=n.ny;moved=false;
    window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);};
  const move=e=>{const box=$('#canvas').getBoundingClientRect();const dx=(e.clientX-sx)/box.width,dy=(e.clientY-sy)/box.height;
    if(Math.abs(dx)+Math.abs(dy)>.004)moved=true;n.nx=clamp(ox+dx,.04,.96);n.ny=clamp(oy+dy,.05,.95);
    dom.style.left=(n.nx*100)+'%';dom.style.top=(n.ny*100)+'%';if(state.sel===n.id){positionReticle();positionBubble();}drawLinks(null);};
  const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);
    if(moved){pushUndo();logAudit(`Moved ${n.tag}`,'cfg');}};
  dom.addEventListener('pointerdown',down);}

function generateFromIntake(){

  const vv=$('#qVert .chip.on');P.vertical=vv?vv.dataset.v:VERTICALS[0];P.redundancy=$('#qRed').value;P.network=$('#qNet').value;

  if(picked.length){state.nodes=[];state.links=[];const counts={};const n=picked.length;
    picked.forEach(([type,qty],idx)=>{const T=TYPES[type];const a=(idx/n)*Math.PI*2-Math.PI/2;
      const nx=clamp(0.5+Math.cos(a)*0.32,0.1,0.9),ny=clamp(0.5+Math.sin(a)*0.30,0.13,0.87);

function autoRoute(){const by=s=>state.nodes.filter(n=>TYPES[n.type].system===s);
  const hub=by('compute')[0]||by('process')[0]||state.nodes[0];const link=(a,b,l)=>{if(a&&b&&a!==b&&!state.links.some(x=>(x.a===a&&x.b===b)||(x.a===b&&x.b===a)))state.links.push({a,b,layer:l});};
  by('power').forEach(p=>hub&&link(p.id,hub.id,'power'));
  by('cooling').forEach(c=>hub&&link(c.id,hub.id,'cooling'));
  const ctrl=state.nodes.find(n=>TYPES[n.type].system==='control');
  if(ctrl)state.nodes.filter(n=>ioTotal(n.io)>0&&n.id!==ctrl.id).slice(0,8).forEach(n=>link(ctrl.id,n.id,'control'));
  by('network').forEach(s=>ctrl&&link(s.id,ctrl.id,'network'));
  by('safety').forEach(s=>hub&&link(s.id,hub.id,'safety'));}

function addNode(type){const T=TYPES[type],count=state.nodes.filter(n=>n.type===type).length+1;pushUndo();
  const node={id:uid(),type,name:T.label.toUpperCase(),tag:`${T.short}-${String(count).padStart(2,'0')}`,
    nx:.5+(Math.random()-.5)*.1,ny:.5+(Math.random()-.5)*.1,qty:1,io:baseIO(type),drill:false};
  state.nodes.push(node);state.sel=node.id;logAudit(`Added ${node.tag} (${node.name})`,'add');renderAll();toast('Added',`${node.tag} placed.`);}
function renderPalette(){const p=$('#palette');const quick=['server_hall','chiller','crah','ups','pdu','chw_pump','pump_vfd','valve_ctrl','core_switch','plc_panel','facp'];
  p.innerHTML=quick.map(k=>`<button class="pchip" data-add="${k}">${ICON[TYPES[k].icon]}<span>${TYPES[k].label}</span></button>`).join('');
  $$('.pchip',p).forEach(b=>b.onclick=()=>addNode(b.dataset.add));}

/* ═══════════ EXPORTS ═══════════════════════════════════════════ */
function toCSV(rows,cols){return [cols.map(c=>`"${c[1]}"`).join(',')].concat(rows.map(r=>cols.map(c=>`"${String(r[c[0]]).replace(/"/g,'""')}"`).join(','))).join('\n');}
function download(fn,data,mime){const b=new Blob([data],{type:mime}),u=URL.createObjectURL(b),a=el('a');a.href=u;a.download=fn;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);}
function exportDock(){
  const base=(state.project.name||'dcsketch').replace(/[^a-z0-9]+/gi,'_').toLowerCase();
  if(state.dock==='bom'){const e=estimate();const cols=[['grp','Group'],['item','Item'],['qty','Qty'],['unit','Unit'],['mat','Material'],['labHrs','LaborHrs'],['lab','Labor$']];
    download(base+'_bom.csv',toCSV(e.lines.map(l=>({...l,mat:Math.round(l.mat),lab:Math.round(l.lab),labHrs:Math.round(l.labHrs||0)})),cols),'text/csv');}
  else if(['lic','rev'].includes(state.dock)){toast('Export','Use BOM/schedule tabs for CSV; this view is summary-only.');return;}
  else{const D=DOCKS[state.dock];download(base+'_'+state.dock+'.csv',toCSV(D.build(),D.cols),'text/csv');}
  logAudit(`Exported ${DOCKS[state.dock].label} (CSV)`,'cfg');toast('Export',`${DOCKS[state.dock].label} downloaded.`);
}

/* ═══════════ TOASTS ════════════════════════════════════════════ */
function toast(head,body,kind){const t=$('#toast');const c=el('div','toastcard'+(kind?' '+kind:''),`<span class="x">✕</span><div class="th">${head}</div>${body}`);
  t.appendChild(c);$('.x',c).onclick=()=>c.remove();setTimeout(()=>{c.style.transition='opacity .4s';c.style.opacity='0';setTimeout(()=>c.remove(),400);},4000);
  while(t.children.length>3)t.firstChild.remove();}

/* ═══════════ WIRING ════════════════════════════════════════════ */
function wire(){
  $('#btnSave').onclick=saveJSON;
  $('#btnUndo').onclick=()=>{if(!undoStack.length)return;redoStack.push(snapshot());restore(undoStack.pop());refreshUndo();toast('Undo','Reverted.');};
  $('#btnRedo').onclick=()=>{if(!redoStack.length)return;undoStack.push(snapshot());restore(redoStack.pop());refreshUndo();};
  $('#btnQuest').onclick=openIntake;$('#btnExport').onclick=exportMenu;
  $$('.rail-ic').forEach(ic=>ic.onclick=()=>{
    if(ic.dataset.dock)setDock(ic.dataset.dock);
    if(ic.dataset.act==='tree')document.body.classList.toggle('hidetree');
    if(ic.dataset.act==='fit')fitView();
    if(ic.dataset.act==='settings'){setPv('params');}
  });
  $$('.ptab').forEach(t=>t.onclick=()=>setPv(t.dataset.pv));
  $$('#cbar .cbtn').forEach(b=>b.onclick=()=>{if(b.dataset.act==='fit')fitView();if(b.dataset.act==='add')addNode('crah');});
  $$('.dtool').forEach(b=>b.onclick=()=>{const t=b.dataset.dtool;
    if(t==='csv')exportDock();
    if(t==='min')document.body.classList.toggle('dock-min');
    if(t==='max')document.body.classList.toggle('dock-max');});
  $('#canvas').addEventListener('pointerdown',e=>{
    if(e.target.closest('.node,#bubble,#legend,#palette,#cbar,#crumb,#cstats'))return;
    if(linking){linking=null;$('#canvas').style.cursor='';toast('Cancelled','');return;}
    if(state.drill){state.drill=null;renderCanvas();return;}
    state.sel=null;renderTop();renderCanvas();renderPvNode();renderDock();});
  window.addEventListener('keydown',e=>{
    if($('#scrim').classList.contains('on')){if(e.key==='Escape')closeModal();return;}
    if(e.target.tagName==='INPUT')return;
    if(e.key==='Escape'){if(openMenu!=null){renderMenus(null);}else if(linking){linking=null;$('#canvas').style.cursor='';}else if(state.drill){state.drill=null;renderCanvas();}else{state.sel=null;renderCanvas();renderPvNode();renderTop();}}
    if((e.key==='z'||e.key==='Z')&&(e.metaKey||e.ctrlKey)){e.preventDefault();$('#btnUndo').click();}
    if(e.key==='Delete'&&selNode())deleteNode(state.sel);
    if(/^[1-7]$/.test(e.key)){const legs=$$('#legend .leg'),i=+e.key-1;if(legs[i])legs[i].click();}});
  new ResizeObserver(()=>drawLinks(state.drill?state.nodes.find(n=>n.id===state.drill):null)).observe($('#canvas'));
}
function fitView(){if(!state.nodes.length)return;const xs=state.nodes.map(n=>n.nx),ys=state.nodes.map(n=>n.ny);
  const minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);
  const cx=(minx+maxx)/2,cy=(miny+maxy)/2,s=Math.min(0.76/Math.max(.2,maxx-minx),0.76/Math.max(.2,maxy-miny),1.7);
  state.nodes.forEach(n=>{n.nx=clamp(0.5+(n.nx-cx)*s,.06,.94);n.ny=clamp(0.5+(n.ny-cy)*s,.07,.93);});renderCanvas();toast('View','Fit to canvas.');}

const fileBase=()=>(state.project.name||'dcsketch').replace(/[^a-z0-9]+/gi,'_').toLowerCase();
function saveJSON(){download(fileBase()+'.json',JSON.stringify({project:state.project,rates:state.rates,nodes:state.nodes,links:state.links},null,2),'application/json');toast('Saved','Project .json downloaded.');}
function saveAsTemplate(){download(fileBase()+'_template.json',JSON.stringify({project:state.project,nodes:state.nodes.map(n=>({t:n.type,tag:n.tag,name:n.name,x:+n.nx.toFixed(3),y:+n.ny.toFixed(3),q:n.qty,b:n.blurb||''})),links:state.links.map(l=>{const a=state.nodes.find(n=>n.id===l.a),b=state.nodes.find(n=>n.id===l.b);return[a&&a.tag,b&&b.tag,l.layer];}).filter(x=>x[0]&&x[1])},null,2),'application/json');toast('Template saved','Reusable template .json downloaded.');}
function importJSON(){const inp=el('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const d=JSON.parse(r.result);
      if(d.nodes&&d.nodes[0]&&d.nodes[0].t&&!d.nodes[0].id){loadTemplate(d);return;} // template form
      if(!d.nodes)throw 0;pushUndo();
      state.project=Object.assign({description:''},d.project||state.project);state.rates=Object.assign({...RATES},d.rates||{});
      state.nodes=d.nodes;state.links=d.links||[];state.sel=state.nodes[0]?.id||null;state.drill=null;
      logAudit('Imported project '+(state.project.name||''),'add');renderAll();toast('Imported',`${state.nodes.length} nodes loaded.`);}
      catch(e){toast('Import failed','Not a valid DCSketch project file.','err');}};
    r.readAsText(f);};inp.click();}
function duplicateNode(){const s=selNode();if(!s){toast('Edit','Select a node first.');return;}pushUndo();
  const T=TYPES[s.type],count=state.nodes.filter(n=>n.type===s.type).length+1;
  const n={id:uid(),type:s.type,name:s.name,tag:`${T.short}-${String(count).padStart(2,'0')}`,nx:clamp(s.nx+0.04,.05,.95),ny:clamp(s.ny+0.05,.05,.95),qty:s.qty,io:{...s.io},blurb:s.blurb||'',drill:false};
  state.nodes.push(n);state.sel=n.id;logAudit(`Duplicated ${s.tag} → ${n.tag}`,'add');renderAll();toast('Duplicated',n.tag);}
function exportAllSchedules(){
  const parts=[`# DCSketch — ${state.project.name||'project'} — all schedules`,''];
  [['I/O LIST',DOCKS.io],['INSTRUMENT INDEX',DOCKS.instr],['LOAD SCHEDULE',DOCKS.load],['PANEL SCHEDULE',DOCKS.panel],['CABLE SCHEDULE',DOCKS.cable]]
    .forEach(([title,D])=>{parts.push('# '+title,toCSV(D.build(),D.cols),'');});
  const e=estimate();
  parts.push('# BOM & COSTING',toCSV(e.lines.map(l=>({...l,mat:Math.round(l.mat),lab:Math.round(l.lab),labHrs:Math.round(l.labHrs||0)})),[['grp','Group'],['item','Item'],['qty','Qty'],['unit','Unit'],['mat','Material'],['labHrs','LaborHrs'],['lab','Labor$']]),'');
  parts.push('# COST ROLLUP',`"Material","${Math.round(e.mat)}"\n"Labor","${Math.round(e.lab)}"\n"Freight","${Math.round(e.freight)}"\n"Contingency","${Math.round(e.contingency)}"\n"Markup","${Math.round(e.markup)}"\n"Tax","${Math.round(e.tax)}"\n"TOTAL INSTALLED","${Math.round(e.total)}"`);
  download(fileBase()+'_all_schedules.csv',parts.join('\n'),'text/csv');
  logAudit('Exported all schedules (CSV bundle)','cfg');toast('Export','All schedules exported to one CSV.');}

  </div><div class="modal-f"><button class="tbtn pri" id="mok">CLOSE</button></div>`;

let openMenu=null;
function renderMenus(openIdx){
  const bar=$('#menubar');bar.querySelectorAll('.menu').forEach(m=>m.remove());
  MENUS().forEach((m,i)=>{
    const menu=el('div','menu'+(i===openIdx?' open':''));
    const mt=el('div','mt',m.label);menu.appendChild(mt);
    const drop=el('div','mdrop');m.items.forEach(it=>drop.appendChild(renderMenuItem(it)));menu.appendChild(drop);
    mt.onclick=e=>{e.stopPropagation();renderMenus(openIdx===i?null:i);};
    mt.onmouseenter=()=>{if(openMenu!=null&&openMenu!==i)renderMenus(i);};
    bar.appendChild(menu);
  });
  openMenu=openIdx;
}
function renderMenuItem(it){
  if(it.sep)return el('div','msep');
  if(it.hd)return el('div','mhd',it.hd);
  const row=el('div','mitem'+(it.sub?' has-sub':'')+(it.cls?' '+it.cls:''));
  const tail=it.sub?'<span class="ar">▸</span>':it.k?`<span class="k">${it.k}</span>`:(it.check?`<span class="k">${it.check()?'✓':''}</span>`:'');
  row.innerHTML=`<span class="mic">${it.ic||''}</span>${it.tpl?`<span class="tname"><b>${it.t}</b><span class="desc">${it.desc||''}</span></span>`:it.t}${tail}`;
  if(it.sub){const sub=el('div','msub');it.sub.forEach(s=>sub.appendChild(renderMenuItem(s)));row.appendChild(sub);}
  else if(it.a)row.onclick=e=>{e.stopPropagation();renderMenus(null);it.a();};
  return row;
}
