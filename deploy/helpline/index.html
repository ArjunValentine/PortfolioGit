<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlueVector Helpline</title>
<meta name="description" content="Request a direct callback from a BlueVector design engineer.">
<link rel="icon" type="image/png" href="../bvlogo.png">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: #f4f5f7;
  font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  position: relative;
  overflow-x: hidden;
}

/* ── Blueprint wallpaper ── */
.blueprint-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background: #f4f5f7;
}
.blueprint-bg svg { position: absolute; opacity: 0.55; }
.bp-grid { inset: 0; width: 100%; height: 100%; opacity: 0.35; }
.bp-left { left: -40px; top: 60px; width: 420px; height: 520px; }
.bp-mid { left: 30%; top: 20px; width: 380px; height: 460px; }
.bp-right { right: -60px; top: 10px; width: 480px; height: 620px; }

/* ── Layout ── */
.logo-card {
  position: relative;
  z-index: 2;
  display: inline-block;
  background: #fff;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(20,30,60,0.12);
  padding: 20px 34px;
  margin: 32px 0 0 32px;
}
.logo-card img { height: 70px; width: auto; display: block; }

.stage {
  position: relative;
  z-index: 2;
  min-height: calc(100vh - 150px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 60px;
}

.splash-card {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(20,30,60,0.16);
  padding: 44px 48px 40px;
  max-width: 560px;
  width: 100%;
}

.splash-card h1 {
  text-align: center;
  font-size: 2.4rem;
  font-weight: 500;
  color: #1a1a2e;
  margin: 0 0 28px;
  line-height: 1.25;
}

.doc-well {
  border: 2px dashed #d5d9e2;
  border-radius: 12px;
  background: #fafbfc;
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 26px;
}
.doc-well svg { width: 64px; height: 64px; }

.call-label {
  font-size: 1.1rem;
  color: #2a2a3a;
  margin-bottom: 14px;
}

.call-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #f0f2f6;
  border-radius: 12px;
  padding: 8px;
}

.call-row .phone-field {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  border-radius: 8px;
  padding: 12px 16px;
}

.call-row .phone-field svg { width: 20px; height: 20px; flex-shrink: 0; color: #666; }

.call-row input {
  border: none;
  outline: none;
  font-size: 1.05rem;
  color: #1a1a2e;
  width: 100%;
  font-family: inherit;
}

.call-btn {
  background: #1669d6;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 14px 24px;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
}
.call-btn:hover { background: #0f52ac; }

.callback-status {
  display: none;
  text-align: center;
  margin-top: 18px;
  color: #1a7a3a;
  font-size: 0.95rem;
  font-weight: 600;
}

.back-link {
  position: relative;
  z-index: 2;
  display: block;
  text-align: center;
  padding: 0 20px 30px;
  font-size: 0.85rem;
  color: #6b7280;
}
.back-link a { color: #1669d6; text-decoration: none; }
.back-link a:hover { text-decoration: underline; }

@media (max-width: 640px) {
  .splash-card { padding: 32px 24px 28px; }
  .splash-card h1 { font-size: 1.8rem; }
  .call-row { flex-direction: column; align-items: stretch; }
  .call-btn { width: 100%; }
  .logo-card { margin: 20px 0 0 20px; padding: 14px 22px; }
  .logo-card img { height: 48px; }
}
</style>
</head>
<body>

<div class="blueprint-bg">
  <svg class="bp-grid" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
        <path d="M42 0 L0 0 0 42" fill="none" stroke="#c7cddb" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>
  </svg>

  <svg class="bp-left" viewBox="0 0 420 520" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#9aa4bb" stroke-width="1.5">
    <rect x="30" y="40" width="220" height="280" rx="2"/>
    <rect x="60" y="80" width="60" height="46"/>
    <rect x="150" y="80" width="60" height="46"/>
    <circle cx="90" cy="103" r="8"/>
    <circle cx="180" cy="103" r="8"/>
    <path d="M30 220 L250 220"/>
    <path d="M120 220 L120 320"/>
    <text x="40" y="360" font-size="11" fill="#9aa4bb" stroke="none" font-family="monospace">ENCLOSURE &amp; DEADFRONT</text>
    <text x="40" y="376" font-size="11" fill="#9aa4bb" stroke="none" font-family="monospace">LAYOUT (TYPICAL)</text>
    <text x="30" y="410" font-size="9" fill="#9aa4bb" stroke="none" font-family="monospace">NOTES:</text>
    <text x="30" y="426" font-size="9" fill="#9aa4bb" stroke="none" font-family="monospace">1. ALL DIMS IN INCHES UON</text>
    <text x="30" y="440" font-size="9" fill="#9aa4bb" stroke="none" font-family="monospace">2. DOOR SWING PER DETAIL C</text>
    <rect x="30" y="450" width="140" height="60" rx="2"/>
    <path d="M30 480 L170 480 M100 450 L100 510"/>
  </svg>

  <svg class="bp-mid" viewBox="0 0 380 460" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#9aa4bb" stroke-width="1.5">
    <text x="20" y="30" font-size="12" fill="#9aa4bb" stroke="none" font-family="monospace">BILL OF MATERIALS</text>
    <path d="M20 44 L340 44"/>
    <path d="M20 60 L340 60 M20 78 L340 78 M20 96 L340 96 M20 114 L340 114 M20 132 L340 132 M20 150 L340 150 M20 168 L340 168"/>
    <path d="M20 44 L20 168 M110 44 L110 168 M340 44 L340 168"/>
    <text x="28" y="180" font-size="9" fill="#9aa4bb" stroke="none" font-family="monospace">MATERIAL ITEMS TO BE CONTROLLED</text>
    <path d="M20 220 L340 220 M20 238 L340 238 M20 256 L340 256 M20 274 L340 274"/>
    <path d="M20 202 L20 274 M340 202 L340 274"/>
    <text x="20" y="310" font-size="9" fill="#9aa4bb" stroke="none" font-family="monospace">COMMON SIZES</text>
    <text x="20" y="324" font-size="9" fill="#9aa4bb" stroke="none" font-family="monospace">IN LUG (H2 HOLE)</text>
    <path d="M20 336 L36 336 L36 352 L20 352 Z M40 336 L56 336 L56 352 L40 352 Z M60 336 L76 336 L76 352 L60 352 Z M80 336 L96 336 L96 352 L80 352 Z"/>
  </svg>

  <svg class="bp-right" viewBox="0 0 480 620" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#9aa4bb" stroke-width="1.5">
    <circle cx="80" cy="60" r="18"/>
    <path d="M62 60 L20 60 M98 60 L140 60"/>
    <rect x="140" y="40" width="60" height="40"/>
    <circle cx="260" cy="60" r="16"/>
    <circle cx="320" cy="60" r="16"/>
    <path d="M276 60 L304 60"/>
    <rect x="230" y="120" width="90" height="70" rx="4"/>
    <path d="M230 140 L320 140 M230 160 L320 160"/>
    <circle cx="250" cy="150" r="6"/>
    <circle cx="300" cy="150" r="6"/>
    <path d="M60 200 L60 400 L420 400 L420 200"/>
    <rect x="380" y="180" width="60" height="30"/>
    <circle cx="150" cy="260" r="14"/>
    <circle cx="150" cy="320" r="14"/>
    <path d="M150 274 L150 306"/>
    <text x="380" y="470" font-size="10" fill="#9aa4bb" stroke="none" font-family="monospace">DWG NO. 000-1</text>
    <text x="380" y="484" font-size="10" fill="#9aa4bb" stroke="none" font-family="monospace">REV A</text>
    <path d="M340 500 L470 500 L470 610 L340 610 Z"/>
    <path d="M340 520 L470 520 M340 560 L470 560"/>
  </svg>
</div>

<div class="logo-card">
  <img src="../bvlogo.png" alt="BlueVector">
</div>

<div class="stage">
  <div class="splash-card">
    <h1>Troubleshoot Your Design Issue</h1>

    <div class="doc-well">
      <svg viewBox="0 0 24 24" fill="none" stroke="#9aa4bb" stroke-width="1.5" stroke-linejoin="round">
        <path d="M6 2 L14 2 L18 6 L18 22 L6 22 Z"/>
        <path d="M14 2 L14 6 L18 6"/>
      </svg>
    </div>

    <div class="call-label">Enter your number to request a direct call.</div>
    <div class="call-row">
      <div class="phone-field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <input type="tel" id="phoneInput" placeholder="+1 (555) 0199">
      </div>
      <button class="call-btn" onclick="requestCallback()">CALL ME NOW</button>
    </div>
    <div class="callback-status" id="callbackStatus">Request received &mdash; a BlueVector engineer will call you shortly.</div>
  </div>
</div>

<div class="back-link"><a href="../">&larr; Back to BlueVector.com</a></div>

<script>
  function requestCallback() {
    const input = document.getElementById('phoneInput');
    const phone = input.value.trim() || input.placeholder;
    const status = document.getElementById('callbackStatus');

    const body = 'Callback requested via Helpline.\nPhone: ' + phone;
    const mailtoLink = 'mailto:hello@peterjamesvilla.com'
      + '?subject=' + encodeURIComponent('Direct Call Request')
      + '&body=' + encodeURIComponent(body);
    window.location.href = mailtoLink;

    status.style.display = 'block';
  }
</script>

</body>
</html>
